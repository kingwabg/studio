<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>캔바 사이드바 컴포넌트 — Document Studio</title>
<style>
body{font-family:'IBM Plex Sans KR',system-ui,sans-serif;margin:0;padding:20px;background:#fff;color:#1e2124}
h1{font-size:15px;margin:0 0 4px} p{font-size:11.5px;color:#6d7882;margin:0 0 16px}
h2{font-size:12px;color:#464c53;margin:16px 0 8px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:76px;height:64px;background:#fff;border:1px solid #cdd1d5;border-radius:8px;font-size:11.5px;font-weight:600;color:#464c53}
.card:hover{border-color:#256ef4}
.card svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.4}
.iconbtn{width:34px;height:30px;display:inline-flex;align-items:center;justify-content:center;background:#fff;border:1px solid #cdd1d5;border-radius:6px;color:#464c53;font-weight:700;font-size:13px}
.iconbtn.act{background:#256ef4;border-color:#256ef4;color:#fff}
.chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;border:1px solid #cdd1d5;background:#fff;color:#6d7882}
.chip.on{background:#ecf2fe;border-color:#b1cefb;color:#256ef4}
.fullbtn{height:32px;display:inline-flex;align-items:center;gap:6px;padding:0 12px;border:1px solid #cdd1d5;border-radius:6px;background:#fff;font-size:12px;font-weight:600;color:#464c53}
.banner{display:inline-flex;align-items:center;gap:8px;padding:8px 11px;background:#ecf2fe;border:1px solid #d0d4e2;border-radius:8px;font-size:12px;font-weight:600;color:#464c53}
.stepper{display:inline-flex;align-items:center;border:1px solid #cdd1d5;border-radius:6px;overflow:hidden}
.stepper button{width:28px;height:30px;border:none;background:#fff;color:#6d7882;font-size:14px}
.stepper input{width:52px;height:30px;border:none;border-left:1px solid #cdd1d5;border-right:1px solid #cdd1d5;text-align:center;font-size:12.5px;font-weight:600}
.sw{width:22px;height:22px;border-radius:5px;border:1px solid #cdd1d5;display:inline-block}
.sw.on{box-shadow:0 0 0 2px #256ef4}
.note{font-size:10.5px;color:#8a949e;margin-top:12px}
</style></head><body>
<h1>캔바 사이드바 컴포넌트</h1>
<p>rhwp-studio 캔버스 한컴의 좌/우 레일 부품. 코드: rhwp-studio/src/ui/canva-*.ts + styles/canva-sidebars.css</p>
<h2>개체 카드 (좌 팔레트)</h2>
<div class="row">
<div class="card"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="M8 9h8M8 13h5"/></svg>글상자</div>
<div class="card"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="1.5"/><path d="M3 10h18M3 15h18M9 4v16M15 4v16"/></svg>표</div>
<div class="card"><svg viewBox="0 0 24 24"><circle cx="8" cy="9" r="4.2"/><rect x="12" y="12" width="8" height="7" rx="1"/></svg>도형</div>
</div>
<h2>인스펙터 컨트롤 (우 레일)</h2>
<div class="row" style="margin-bottom:8px">
<span class="iconbtn act" style="font-weight:800">가</span>
<span class="iconbtn" style="font-style:italic">가</span>
<span class="iconbtn" style="text-decoration:underline">가</span>
<span class="stepper"><button>−</button><input value="10"><button>+</button></span>
<span class="sw on" style="background:#256ef4"></span>
<span class="sw" style="background:#DE3412"></span>
<span class="sw" style="background:#1E2124"></span>
</div>
<div class="row" style="margin-bottom:8px"><span class="fullbtn">글자 모양 자세히…</span><span class="banner">표 셀 편집</span></div>
<h2>모드 칩 (AI 패널 · 메뉴바 토글)</h2>
<div class="row"><span class="chip on">문서 생성</span><span class="chip">일반</span><span class="chip on">캔버스</span><span class="chip">문서</span></div>
<p class="note">규칙: 이모지 금지(인라인 SVG 1.4px), 클래스 접두사 canva-, 색은 design/tokens.md 팔레트만</p>
</body></html>
